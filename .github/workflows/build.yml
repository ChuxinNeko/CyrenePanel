name: Build Release Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_exists: ${{ steps.meta.outputs.release_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and release state
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./CyrenePanelBackend/package.json').version")"
          TAG="v${VERSION}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            RELEASE_EXISTS="true"
          else
            RELEASE_EXISTS="false"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "release_exists=${RELEASE_EXISTS}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.package_os }}-${{ matrix.arch }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_os: windows
            arch: x64
            bun_target: bun-windows-x64
            backend_binary: server.exe
          - package_os: windows
            arch: arm64
            bun_target: bun-windows-arm64
            backend_binary: server.exe
          - package_os: linux
            arch: x64
            bun_target: bun-linux-x64
            backend_binary: server
          - package_os: linux
            arch: arm64
            bun_target: bun-linux-arm64
            backend_binary: server
          - package_os: macos
            arch: x64
            bun_target: bun-darwin-x64
            backend_binary: server
          - package_os: macos
            arch: arm64
            bun_target: bun-darwin-arm64
            backend_binary: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve package name
        id: package
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PACKAGE_NAME="CyrenePanel${VERSION}-${{ matrix.package_os }}-${{ matrix.arch }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install backend dependencies
        working-directory: CyrenePanelBackend
        run: bun install

      - name: Install frontend dependencies
        working-directory: CyrenePanelFrontend
        run: bun install

      - name: Build frontend
        working-directory: CyrenePanelFrontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: bun run build

      - name: Build backend binary
        working-directory: CyrenePanelBackend
        run: |
          bun build \
            --compile \
            --minify-whitespace \
            --minify-syntax \
            --target=${{ matrix.bun_target }} \
            --outfile server \
            src/index.ts

      - name: Assemble release directory
        shell: bash
        run: |
          PACKAGE_NAME="${{ steps.package.outputs.name }}"
          RELEASE_DIR="release/${PACKAGE_NAME}"

          rm -rf release
          mkdir -p "${RELEASE_DIR}/backend/data" "${RELEASE_DIR}/backend/logs" "${RELEASE_DIR}/frontend"

          cp "CyrenePanelBackend/${{ matrix.backend_binary }}" "${RELEASE_DIR}/backend/${{ matrix.backend_binary }}"
          cp CyrenePanelBackend/package.json "${RELEASE_DIR}/backend/package.json"
          cp CyrenePanelBackend/README.md "${RELEASE_DIR}/backend/README.md"
          touch "${RELEASE_DIR}/backend/data/.gitkeep" "${RELEASE_DIR}/backend/logs/.gitkeep"

          cp -R CyrenePanelFrontend/.next/standalone/. "${RELEASE_DIR}/frontend/"
          mkdir -p "${RELEASE_DIR}/frontend/.next/static"
          cp -R CyrenePanelFrontend/.next/static/. "${RELEASE_DIR}/frontend/.next/static/"
          cp -R CyrenePanelFrontend/public/. "${RELEASE_DIR}/frontend/public/" 2>/dev/null || true
          cp CyrenePanelFrontend/package.json "${RELEASE_DIR}/frontend/package.json"

          cat > "${RELEASE_DIR}/README.md" <<EOF
          # ${PACKAGE_NAME}

          Backend binary:
          - backend/${{ matrix.backend_binary }}

          Frontend build:
          - frontend/ (standalone output)

          Target:
          - ${{ matrix.package_os }}-${{ matrix.arch }}
          EOF

      - name: Create zip archive
        shell: bash
        run: |
          cd release
          zip -r "${{ steps.package.outputs.name }}.zip" "${{ steps.package.outputs.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.name }}
          path: release/${{ steps.package.outputs.name }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.prepare.outputs.release_exists == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: CyrenePanel${{ needs.prepare.outputs.version }}-*
          path: release-artifacts
          merge-multiple: true

      - name: Create release and upload packages
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" release-artifacts/*.zip \
              --title "CyrenePanel ${VERSION}" \
              --notes "Automated build artifacts for CyrenePanel ${VERSION}."
          else
            gh release create "${TAG}" release-artifacts/*.zip \
              --title "CyrenePanel ${VERSION}" \
              --notes "Automated build artifacts for CyrenePanel ${VERSION}." \
              --target "${GITHUB_SHA}"
          fi
